<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>获取经纬度</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.08);
            padding: 32px 24px;
            text-align: center;
        }
        h2 { font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .subhead { font-size: 14px; color: #64748b; margin-bottom: 20px; }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: #3b82f6;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 8px 0;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; }
        .btn-success { background: #22c55e; }
        .btn-secondary { background: #8b5cf6; }
        .info-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            border: 1px solid #e2e8f0;
            text-align: left;
        }
        .info-box label {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            display: block;
            margin-top: 8px;
        }
        .info-box label:first-child { margin-top: 0; }
        .info-box .value {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            word-break: break-all;
        }
        .status-msg {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .status-msg.show { display: block; }
        .success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .hint {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 16px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            line-height: 1.6;
        }
        .flex-row { display: flex; gap: 8px; align-items: center; }
        .flex-1 { flex: 1; }
        .mt-8 { margin-top: 8px; }
        .text-center { text-align: center; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>📍 获取经纬度</h2>
    <div class="subhead">用于配置智能开关的地理位置</div>

    <button class="btn" id="getLocationBtn">📡 获取当前位置</button>

    <div id="statusMsg" class="status-msg"></div>

    <div id="resultArea" style="display:none;">
        <div class="info-box">
            <label>纬度 (Latitude)</label>
            <div class="value" id="latitudeDisplay">--</div>
            <label>经度 (Longitude)</label>
            <div class="value" id="longitudeDisplay">--</div>
            <label>精度</label>
            <div class="value" style="font-size:16px; font-weight:400;" id="accuracyDisplay">--</div>
        </div>

        <button class="btn btn-success" id="copyBtn">📋 复制经纬度</button>
        <button class="btn btn-secondary" id="copyFullBtn">📋 复制为 "纬度,经度"</button>
    </div>

    <div class="hint">
        <strong>📌 使用步骤：</strong><br>
        1. 点击 <strong>“获取当前位置”</strong> 并允许定位权限。<br>
        2. 复制经纬度。<br>
        3. 连接设备 AP（<strong>Apex-CFG</strong>），打开配置页面。<br>
        4. 粘贴到对应的纬度和经度输入框。<br><br>
        <strong>💡 提示：</strong> 若定位失败，请检查 GPS 或 WiFi 是否开启，并确保允许浏览器位置权限。
    </div>
</div>

<script>
    (function() {
        const btn = document.getElementById('getLocationBtn');
        const statusMsg = document.getElementById('statusMsg');
        const resultArea = document.getElementById('resultArea');
        const latDisplay = document.getElementById('latitudeDisplay');
        const lngDisplay = document.getElementById('longitudeDisplay');
        const accDisplay = document.getElementById('accuracyDisplay');

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg show ' + type;
        }

        function hideStatus() {
            statusMsg.className = 'status-msg';
        }

        function showResult(pos) {
            const coords = pos.coords;
            const lat = coords.latitude.toFixed(6);
            const lng = coords.longitude.toFixed(6);
            latDisplay.textContent = lat;
            lngDisplay.textContent = lng;
            accDisplay.textContent = coords.accuracy ? '±' + coords.accuracy.toFixed(0) + ' 米' : '--';
            resultArea.style.display = 'block';
            showStatus('✅ 定位成功！请复制经纬度', 'success');
            btn.textContent = '🔄 重新定位';
            btn.disabled = false;
        }

        function getLocation() {
            if (!navigator.geolocation) {
                showStatus('❌ 您的浏览器不支持定位', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ 定位中...';
            hideStatus();
            resultArea.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    showResult(pos);
                },
                function(err) {
                    btn.disabled = false;
                    btn.textContent = '📍 重新获取';
                    let msg = '定位失败：';
                    switch(err.code) {
                        case err.PERMISSION_DENIED: msg += '用户拒绝权限，请在浏览器设置中允许'; break;
                        case err.POSITION_UNAVAILABLE: msg += '位置不可用（GPS/WiFi未开）'; break;
                        case err.TIMEOUT: msg += '定位超时，请重试'; break;
                        default: msg += err.message;
                    }
                    showStatus('❌ ' + msg, 'error');
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        // 复制函数
        function copyText(text, successMsg) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showStatus('✅ ' + successMsg, 'success');
                }).catch(() => {
                    fallbackCopy(text, successMsg);
                });
            } else {
                fallbackCopy(text, successMsg);
            }
        }

        function fallbackCopy(text, successMsg) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showStatus('✅ ' + successMsg, 'success');
            } catch (e) {
                showStatus('❌ 复制失败，请手动复制', 'error');
            }
            document.body.removeChild(textarea);
        }

        document.getElementById('copyBtn').addEventListener('click', function() {
            const lat = latDisplay.textContent;
            const lng = lngDisplay.textContent;
            if (lat === '--' || lng === '--') {
                showStatus('请先获取位置', 'error');
                return;
            }
            copyText(lat + ', ' + lng, '已复制：' + lat + ', ' + lng);
        });

        document.getElementById('copyFullBtn').addEventListener('click', function() {
            const lat = latDisplay.textContent;
            const lng = lngDisplay.textContent;
            if (lat === '--' || lng === '--') {
                showStatus('请先获取位置', 'error');
                return;
            }
            copyText(lat + ',' + lng, '已复制：' + lat + ',' + lng);
        });

        btn.addEventListener('click', getLocation);
    })();
</script>
</body>
</html>
